name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Verify release versions
        shell: bash
        run: |
          package_version=$(node -p "require('./package.json').version")
          tauri_version=$(node -p "require('./src-tauri/tauri.conf.json').version")

          if [[ "v${package_version}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${package_version}."
            exit 1
          fi

          if [[ "${package_version}" != "${tauri_version}" ]]; then
            echo "package.json version ${package_version} does not match src-tauri/tauri.conf.json version ${tauri_version}."
            exit 1
          fi

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: News Viber ${{ github.ref_name }}
          releaseBody: See the assets to download and install this version.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
