name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release-tauri:
    name: Release ${{ matrix.target }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            node_cache: true
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            apple_signing_identity: "-"
          - runner: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            node_cache: false
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            apple_signing_identity: "-"
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            args: --bundles nsis --target x86_64-pc-windows-msvc
            node_cache: false
            rust_targets: x86_64-pc-windows-msvc
            apple_signing_identity: ""
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            args: --bundles nsis --target aarch64-pc-windows-msvc
            node_cache: false
            rust_targets: aarch64-pc-windows-msvc
            apple_signing_identity: ""
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js with npm cache
        if: ${{ matrix.node_cache }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Node.js
        if: ${{ !matrix.node_cache }}
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust stable with configured targets
        if: ${{ matrix.rust_targets != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Rust stable
        if: ${{ matrix.rust_targets == '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Verify release versions
        shell: bash
        run: |
          package_version=$(node -p "require('./package.json').version")
          tauri_version=$(node -p "require('./src-tauri/tauri.conf.json').version")

          if [[ "v${package_version}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${package_version}."
            exit 1
          fi

          if [[ "${package_version}" != "${tauri_version}" ]]; then
            echo "package.json version ${package_version} does not match src-tauri/tauri.conf.json version ${tauri_version}."
            exit 1
          fi

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.apple_signing_identity }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: News Viber ${{ github.ref_name }}
          releaseBody: See the assets to download and install this version.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Verify macOS app signature
        if: ${{ matrix.apple_signing_identity != '' }}
        shell: bash
        run: |
          shopt -s nullglob
          app_paths=(src-tauri/target/*/release/bundle/macos/*.app)

          if [[ ${#app_paths[@]} -eq 0 ]]; then
            app_paths=(src-tauri/target/release/bundle/macos/*.app)
          fi

          if [[ ${#app_paths[@]} -eq 0 ]]; then
            echo "No macOS app bundle found to verify."
            exit 1
          fi

          for app_path in "${app_paths[@]}"; do
            echo "Verifying ${app_path}"
            codesign --verify --deep --strict --verbose=4 "$app_path"
          done
